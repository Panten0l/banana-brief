<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍌 Banana Agency — Client Briefs</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yellow: #FDD835;
    --yellow-dark: #F9A825;
    --black: #0a0a0a;
    --charcoal: #141414;
    --card: #1a1a1a;
    --border: rgba(255,255,255,0.08);
    --text: #ffffff;
    --text-muted: rgba(255,255,255,0.5);
    --text-dim: rgba(255,255,255,0.3);
    --green: #00e676;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--charcoal);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.06em;
    color: var(--yellow);
  }

  .logo span { color: var(--text); }

  /* ── TABS ── */
  .tabs-row {
    display: flex;
    gap: 0;
    background: var(--charcoal);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    overflow-x: auto;
  }

  .tab-btn {
    background: none;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 16px 20px 13px;
    text-transform: uppercase;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--yellow); border-bottom-color: var(--yellow); }

  /* ── LANG SWITCHER ── */
  .lang-switcher {
    display: flex;
    gap: 6px;
  }

  .lang-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-muted);
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 10px;
    transition: all 0.18s;
  }

  .lang-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
  .lang-btn.active { background: var(--yellow); color: var(--black); border-color: var(--yellow); }

  /* ── MAIN LAYOUT ── */
  .main {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ── FORM HEADER ── */
  .form-hero {
    background: var(--yellow);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 36px 40px 32px;
    position: relative;
    overflow: hidden;
  }

  .form-hero::before {
    content: '';
    position: absolute;
    right: -20px;
    top: -20px;
    width: 160px;
    height: 160px;
    background: rgba(0,0,0,0.07);
    border-radius: 50%;
  }

  .form-hero::after {
    content: '🍌';
    position: absolute;
    right: 32px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 64px;
    opacity: 0.3;
  }

  .form-type-tag {
    background: rgba(0,0,0,0.15);
    border-radius: 4px;
    color: rgba(0,0,0,0.6);
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    margin-bottom: 12px;
    padding: 4px 10px;
    text-transform: uppercase;
  }

  .form-title {
    color: var(--black);
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    max-width: 80%;
  }

  .form-subtitle {
    color: rgba(0,0,0,0.6);
    font-size: 14px;
    line-height: 1.6;
    max-width: 80%;
  }

  /* ── FORM BODY ── */
  .form-body {
    background: var(--card);
    border: 1px solid var(--border);
    border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
  }

  /* ── SECTION ── */
  .section {
    border-bottom: 1px solid var(--border);
    padding: 32px 40px;
  }

  .section:last-child { border-bottom: none; }

  .section-label {
    align-items: center;
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
  }

  .section-num {
    background: var(--yellow);
    border-radius: 6px;
    color: var(--black);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 3px 8px;
  }

  .section-title {
    color: var(--text);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ── QUESTION ── */
  .question {
    margin-bottom: 28px;
  }

  .question:last-child { margin-bottom: 0; }

  .q-label {
    color: var(--text);
    display: block;
    font-size: 14px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 10px;
  }

  .q-required { color: var(--yellow); margin-left: 3px; }

  .q-hint {
    color: var(--text-dim);
    font-size: 12px;
    margin-bottom: 10px;
    margin-top: -6px;
  }

  /* ── INPUTS ── */
  input[type="text"],
  input[type="email"],
  input[type="tel"],
  input[type="url"],
  textarea,
  select {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    outline: none;
    padding: 12px 16px;
    transition: border-color 0.18s;
    width: 100%;
  }

  input[type="text"]:focus,
  input[type="email"]:focus,
  input[type="tel"]:focus,
  input[type="url"]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--yellow);
    background: rgba(253,216,53,0.04);
  }

  textarea { min-height: 100px; resize: vertical; }

  select option { background: var(--charcoal); }

  /* ── CHECKBOXES & RADIOS ── */
  .options-grid {
    display: grid;
    gap: 8px;
    grid-template-columns: 1fr 1fr;
  }

  .options-grid.cols-1 { grid-template-columns: 1fr; }
  .options-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

  .opt-label {
    align-items: center;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    cursor: pointer;
    display: flex;
    gap: 10px;
    padding: 10px 14px;
    transition: all 0.15s;
  }

  .opt-label:hover {
    background: rgba(253,216,53,0.06);
    border-color: rgba(253,216,53,0.3);
  }

  .opt-label input[type="checkbox"],
  .opt-label input[type="radio"] {
    accent-color: var(--yellow);
    flex-shrink: 0;
    height: 16px;
    width: 16px;
  }

  .opt-text {
    color: var(--text-muted);
    font-size: 13px;
    line-height: 1.4;
  }

  /* ── DIVIDER ── */
  .q-divider {
    border: none;
    border-top: 1px dashed var(--border);
    margin: 24px 0;
  }

  /* ── SUBMIT ── */
  .submit-section {
    background: var(--charcoal);
    border-radius: 0 0 var(--radius) var(--radius);
    padding: 32px 40px;
    border: 1px solid var(--border);
    border-top: none;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .submit-note {
    color: var(--text-dim);
    font-size: 12px;
    line-height: 1.6;
  }

  .submit-note a { color: var(--yellow); text-decoration: none; }

  .btn-submit {
    background: var(--yellow);
    border: none;
    border-radius: 8px;
    color: var(--black);
    cursor: pointer;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 14px 32px;
    transition: all 0.18s;
    white-space: nowrap;
  }

  .btn-submit:hover {
    background: var(--yellow-dark);
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(253,216,53,0.25);
  }

  .btn-submit:active { transform: translateY(0); }

  .btn-submit:disabled {
    cursor: wait;
    opacity: 0.65;
    transform: none;
    box-shadow: none;
  }

  /* ── PANELS ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── NOTIFICATION ── */
  .notif {
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.3);
    border-radius: var(--radius);
    color: var(--green);
    display: none;
    font-size: 14px;
    margin-top: 24px;
    padding: 20px 28px;
    text-align: center;
  }

  .notif.error {
    background: rgba(255,82,82,0.1);
    border-color: rgba(255,82,82,0.35);
    color: #ff8a8a;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .site-header { padding: 16px 20px; }
    .tabs-row { padding: 0 20px; }
    .main { padding: 32px 16px 60px; }
    .form-hero { padding: 28px 24px 24px; }
    .form-title { font-size: 22px; max-width: 100%; }
    .form-subtitle { max-width: 100%; }
    .form-hero::after { display: none; }
    .section { padding: 24px 24px; }
    .options-grid { grid-template-columns: 1fr; }
    .options-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    .submit-section { padding: 24px; flex-direction: column; align-items: flex-start; }
    .btn-submit { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo">BANANA<span>AGENCY</span></div>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('pl')">PL</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
  </div>
</header>

<!-- BRIEF TABS -->
<div class="tabs-row">
  <button class="tab-btn active" onclick="setTab('content')" id="tab-content">
    <span class="t" data-ru="🍌 ИИ-Контент" data-en="🍌 AI Content" data-pl="🍌 Treści AI" data-de="🍌 KI-Content"></span>
  </button>
  <button class="tab-btn" onclick="setTab('auto')" id="tab-auto">
    <span class="t" data-ru="⚡ ИИ-Автоматизация" data-en="⚡ AI Automation" data-pl="⚡ Automatyzacja AI" data-de="⚡ KI-Automatisierung"></span>
  </button>
</div>

<main class="main">

  <!-- ════════════════════════════════════════
       BRIEF 1 — AI CONTENT
  ════════════════════════════════════════ -->
  <div class="panel active" id="panel-content">

    <!-- Hero -->
    <div class="form-hero">
      <div class="form-type-tag t" data-ru="БРИФ / КЛИЕНТ" data-en="BRIEF / CLIENT" data-pl="BRIEF / KLIENT" data-de="BRIEF / KUNDE"></div>
      <h1 class="form-title t"
        data-ru="Бриф на создание ИИ-контента"
        data-en="AI Content Creation Brief"
        data-pl="Brief na tworzenie treści AI"
        data-de="Brief zur KI-Content-Erstellung">
      </h1>
      <p class="form-subtitle t"
        data-ru="Расскажите нам о вашем бизнесе и целях — мы разработаем идеальную контент-стратегию на базе ИИ. Чем подробнее, тем лучше."
        data-en="Tell us about your business and goals — we'll craft the perfect AI-powered content strategy. The more detail, the better."
        data-pl="Opowiedz nam o swoim biznesie i celach — stworzymy idealną strategię treści opartą na AI. Im więcej szczegółów, tym lepiej."
        data-de="Erzählen Sie uns von Ihrem Unternehmen und Ihren Zielen — wir entwickeln die perfekte KI-gestützte Content-Strategie. Je mehr Details, desto besser.">
      </p>
    </div>

    <form id="form-content" onsubmit="handleSubmit(event,'notif-content')">
    <div class="form-body">

      <!-- 01 Компания -->
      <div class="section">
        <div class="section-label">
          <span class="section-num">01</span>
          <span class="section-title t" data-ru="О КОМПАНИИ" data-en="ABOUT YOUR COMPANY" data-pl="O FIRMIE" data-de="ÜBER IHR UNTERNEHMEN"></span>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Название компании / бренда <span class='q-required'>*</span>" data-en="Company / Brand name <span class='q-required'>*</span>" data-pl="Nazwa firmy / marki <span class='q-required'>*</span>" data-de="Firmen- / Markenname <span class='q-required'>*</span>"></label>
          <input type="text" required>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Отрасль / ниша <span class='q-required'>*</span>" data-en="Industry / Niche <span class='q-required'>*</span>" data-pl="Branża / nisza <span class='q-required'>*</span>" data-de="Branche / Nische <span class='q-required'>*</span>"></label>
          <input type="text" required>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Сайт и ссылки на соцсети" data-en="Website & social media links" data-pl="Strona www i linki do social media" data-de="Website & Social-Media-Links"></label>
          <input type="url" placeholder="https://">
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Контактное лицо (имя, должность) <span class='q-required'>*</span>" data-en="Contact person (name, role) <span class='q-required'>*</span>" data-pl="Osoba kontaktowa (imię, stanowisko) <span class='q-required'>*</span>" data-de="Ansprechpartner (Name, Position) <span class='q-required'>*</span>"></label>
          <input type="text" required>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Email <span class='q-required'>*</span>" data-en="Email <span class='q-required'>*</span>" data-pl="Adres e-mail <span class='q-required'>*</span>" data-de="E-Mail <span class='q-required'>*</span>"></label>
          <input type="email" required>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Телефон / мессенджер" data-en="Phone / Messenger" data-pl="Telefon / Messenger" data-de="Telefon / Messenger"></label>
          <input type="tel">
        </div>
      </div>

      <!-- 02 О бизнесе -->
      <div class="section">
        <div class="section-label">
          <span class="section-num">02</span>
          <span class="section-title t" data-ru="ВАШ БИЗНЕС" data-en="YOUR BUSINESS" data-pl="TWÓJ BIZNES" data-de="IHR UNTERNEHMEN"></span>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Чем занимается ваша компания? Основной продукт / услуга <span class='q-required'>*</span>" data-en="What does your company do? Main product / service <span class='q-required'>*</span>" data-pl="Czym zajmuje się firma? Główny produkt / usługa <span class='q-required'>*</span>" data-de="Was macht Ihr Unternehmen? Hauptprodukt / -dienstleistung <span class='q-required'>*</span>"></label>
          <textarea required></textarea>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Что выделяет вас среди конкурентов?" data-en="What sets you apart from competitors?" data-pl="Co wyróżnia Cię na tle konkurencji?" data-de="Was unterscheidet Sie von Mitbewerbern?"></label>
          <textarea></textarea>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Стадия развития бизнеса <span class='q-required'>*</span>" data-en="Business stage <span class='q-required'>*</span>" data-pl="Etap rozwoju biznesu <span class='q-required'>*</span>" data-de="Unternehmensphase <span class='q-required'>*</span>"></label>
          <div class="options-grid cols-1">
            <label class="opt-label"><input type="radio" name="stage-c" value="startup"><span class="opt-text t" data-ru="Стартап — только запускаемся" data-en="Startup — just launching" data-pl="Startup — dopiero startujemy" data-de="Startup — gerade gestartet"></span></label>
            <label class="opt-label"><input type="radio" name="stage-c" value="growth"><span class="opt-text t" data-ru="Рост — активно масштабируемся" data-en="Growth — actively scaling" data-pl="Wzrost — aktywnie się rozwijamy" data-de="Wachstum — aktiv skalierend"></span></label>
            <label class="opt-label"><input type="radio" name="stage-c" value="established"><span class="opt-text t" data-ru="Устоявшийся бизнес" data-en="Established business" data-pl="Ugruntowana firma" data-de="Etabliertes Unternehmen"></span></label>
            <label class="opt-label"><input type="radio" name="stage-c" value="scaling"><span class="opt-text t" data-ru="Масштабирование на новые рынки" data-en="Scaling into new markets" data-pl="Skalowanie na nowe rynki" data-de="Expansion in neue Märkte"></span></label>
          </div>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Ваши 3 главных бизнес-цели на следующие 6 месяцев <span class='q-required'>*</span>" data-en="Your top 3 business goals for the next 6 months <span class='q-required'>*</span>" data-pl="3 główne cele biznesowe na najbliższe 6 miesięcy <span class='q-required'>*</span>" data-de="Ihre 3 wichtigsten Unternehmensziele für die nächsten 6 Monate <span class='q-required'>*</span>"></label>
          <textarea required></textarea>
        </div>
      </div>

      <!-- 03 Целевая аудитория -->
      <div class="section">
        <div class="section-label">
          <span class="section-num">03</span>
          <span class="section-title t" data-ru="ЦЕЛЕВАЯ АУДИТОРИЯ" data-en="TARGET AUDIENCE" data-pl="GRUPA DOCELOWA" data-de="ZIELGRUPPE"></span>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Опишите вашего идеального клиента (возраст, пол, интересы, профессия) <span class='q-required'>*</span>" data-en="Describe your ideal customer (age, gender, interests, profession) <span class='q-required'>*</span>" data-pl="Opisz swojego idealnego klienta (wiek, płeć, zainteresowania, zawód) <span class='q-required'>*</span>" data-de="Beschreiben Sie Ihren idealen Kunden (Alter, Geschlecht, Interessen, Beruf) <span class='q-required'>*</span>"></label>
          <textarea required></textarea>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Географический охват <span class='q-required'>*</span>" data-en="Geographic focus <span class='q-required'>*</span>" data-pl="Zasięg geograficzny <span class='q-required'>*</span>" data-de="Geografischer Fokus <span class='q-required'>*</span>"></label>
          <div class="options-grid">
            <label class="opt-label"><input type="radio" name="geo-c" value="city"><span class="opt-text t" data-ru="Один город" data-en="Single city" data-pl="Jedno miasto" data-de="Eine Stadt"></span></label>
            <label class="opt-label"><input type="radio" name="geo-c" value="country"><span class="opt-text t" data-ru="Страна" data-en="Country" data-pl="Kraj" data-de="Land"></span></label>
            <label class="opt-label"><input type="radio" name="geo-c" value="europe"><span class="opt-text t" data-ru="Европа" data-en="Europe" data-pl="Europa" data-de="Europa"></span></label>
            <label class="opt-label"><input type="radio" name="geo-c" value="global"><span class="opt-text t" data-ru="Весь мир" data-en="Worldwide" data-pl="Cały świat" data-de="Weltweit"></span></label>
          </div>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Язык(и) вашей аудитории" data-en="Language(s) your audience speaks" data-pl="Języki Twojej grupy docelowej" data-de="Sprache(n) Ihrer Zielgruppe"></label>
          <input type="text">
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Главные боли и проблемы аудитории" data-en="Main pain points of your audience" data-pl="Główne problemy / pain points odbiorców" data-de="Hauptprobleme Ihrer Zielgruppe"></label>
          <textarea></textarea>
        </div>

        <div class="question">
          <label class="q-label t" data-ru="Что мотивирует их покупать / подписываться?" data-en="What motivates them to buy / subscribe?" data-pl="Co motywuje ich do zakupu / subskrypcji?" data-de="Was motiviert sie zum Kauf / zur Anmeldung?"></label>
          <textarea></textarea>
        </div>
      </div>

      <!-- 04 Контент-стратегия -->
      <div class="section">
        <div class="section-label">
          <span class="section-num">04</span>
          <span class="section-title t" data-ru="КОНТЕНТ-СТРАТЕГИЯ" data-en="CONTENT STRATEGY" data-pl="STRATEGIA TREŚCI" data-de="CONTENT-STRATEGIE"></span>

        data-ru="Мы свяжемся с вами в течение <strong>24 часов</strong>.<br><a href='mailto:info@bananaagency.net'>info@bananaagency.net</a> · www.bananaagency.net"
        data-en="We'll get back to you within <strong>24 hours</strong>.<br><a href='mailto:info@bananaagency.net'>info@bananaagency.net</a> · www.bananaagency.net"
        data-pl="Skontaktujemy się w ciągu <strong>24 godzin</strong>.<br><a href='mailto:info@bananaagency.net'>info@bananaagency.net</a> · www.bananaagency.net"
        data-de="Wir melden uns innerhalb von <strong>24 Stunden</strong>.<br><a href='mailto:info@bananaagency.net'>info@bananaagency.net</a> · www.bananaagency.net">

    <div class="notif" id="notif-auto" style="display:none">
      <span class="t"
        data-ru="✅ Бриф отправлен! Мы свяжемся с вами в течение 24 часов. 🍌"
        data-en="✅ Brief submitted! We'll be in touch within 24 hours. 🍌"
        data-pl="✅ Brief wysłany! Skontaktujemy się w ciągu 24 godzin. 🍌"
        data-de="✅ Brief gesendet! Wir melden uns innerhalb von 24 Stunden. 🍌">
      </span>
    </div>

  </div><!-- /panel-auto -->

</main>

<script>
  let currentLang = 'ru';
  const FORM_ENDPOINT = 'https://formsubmit.co/ajax/info@bananaagency.net';
  const FORM_TYPES = {
    'form-content': {
      ru: 'Бриф на создание ИИ-контента',
      en: 'AI Content Creation Brief',
      pl: 'Brief na tworzenie tresci AI',
      de: 'Brief zur KI-Content-Erstellung'
    },
    'form-auto': {
      ru: 'Бриф на ИИ-автоматизацию бизнеса',
      en: 'AI Business Automation Brief',
      pl: 'Brief na automatyzacje AI',
      de: 'Brief zur KI-Business-Automatisierung'
    }
  };
  const STATUS_TEXT = {
    sending: {
      ru: 'Отправляем бриф...',
      en: 'Sending brief...',
      pl: 'Wysylamy brief...',
      de: 'Brief wird gesendet...'
    },
    error: {
      ru: 'Не получилось отправить бриф. Проверьте интернет и попробуйте еще раз или напишите нам на info@bananaagency.net.',
      en: 'Could not send the brief. Please check your connection and try again or email us at info@bananaagency.net.',
      pl: 'Nie udalo sie wyslac briefu. Sprawdz internet i sprobuj ponownie albo napisz na info@bananaagency.net.',
      de: 'Der Brief konnte nicht gesendet werden. Bitte Verbindung pruefen und erneut versuchen oder an info@bananaagency.net schreiben.'
    }
  };

  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
    renderTranslations();
  }

  function renderTranslations() {
    document.querySelectorAll('.t[data-' + currentLang + ']').forEach(el => {
      el.innerHTML = el.getAttribute('data-' + currentLang);
    });
  }

  function setTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + tab).classList.add('active');
    document.getElementById('panel-' + tab).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function cleanText(value) {
    return (value || '')
      .replace(/\s*\*\s*/g, ' ')
      .replace(/\s+/g, ' ')
      .trim();
  }

  function getElementText(el) {
    return cleanText(el ? (el.innerText || el.textContent) : '');
  }

  function getQuestionLabel(question, fallback) {
    const label = question.querySelector('.q-label');
    return getElementText(label) || fallback || 'Field';
  }

  function getOptionText(input) {
    const option = input.closest('.opt-label');
    const optionText = option ? option.querySelector('.opt-text') : null;
    return getElementText(optionText || option) || input.value || 'Selected';
  }

  function setPayloadValue(payload, key, value) {
    const normalizedKey = cleanText(key);
    const normalizedValue = Array.isArray(value)
      ? value.map(cleanText).filter(Boolean).join(', ')
      : cleanText(value);

    if (!normalizedKey || !normalizedValue) return;

    if (payload[normalizedKey]) {
      payload[normalizedKey] = `${payload[normalizedKey]}; ${normalizedValue}`;
    } else {
      payload[normalizedKey] = normalizedValue;
    }
  }

  function collectFormPayload(form) {
    const formType = FORM_TYPES[form.id]?.[currentLang] || FORM_TYPES[form.id]?.ru || form.id;
    const payload = {
      _subject: `New ${formType} - Banana Agency`,
      _template: 'table',
      form_type: formType,
      language: currentLang,
      submitted_at: new Date().toISOString()
    };

    form.querySelectorAll('.question').forEach((question, index) => {
      const label = getQuestionLabel(question, `Question ${index + 1}`);

      question.querySelectorAll('input:not([type="radio"]):not([type="checkbox"]):not([type="hidden"]), textarea, select').forEach((field) => {
        const value = field.value;
        setPayloadValue(payload, label, value);

        if (field.type === 'email' && value) {
          payload.email = cleanText(value);
          payload._replyto = cleanText(value);
        }

        if (!payload.name && index === 0 && value) {
          payload.name = cleanText(value);
        }
      });

      const checkedRadio = question.querySelector('input[type="radio"]:checked');
      if (checkedRadio) {
        setPayloadValue(payload, label, getOptionText(checkedRadio));
      }

      const checkedBoxes = [...question.querySelectorAll('input[type="checkbox"]:checked')];
      if (checkedBoxes.length) {
        setPayloadValue(payload, label, checkedBoxes.map(getOptionText));
      }
    });

    return payload;
  }

  function setNotification(notifId, type, text) {
    const notif = document.getElementById(notifId);
    const message = notif.querySelector('.t');

    notif.classList.toggle('error', type === 'error');

    if (text) {
      message.textContent = text;
    } else {
      message.innerHTML = message.getAttribute('data-' + currentLang);
    }

    notif.style.display = 'block';
    notif.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  async function handleSubmit(e, notifId) {
    e.preventDefault();
    const form = e.target;
    const button = form.querySelector('.btn-submit');
    const originalButtonHtml = button.innerHTML;

    button.disabled = true;
    button.textContent = STATUS_TEXT.sending[currentLang] || STATUS_TEXT.sending.ru;

    try {
      const response = await fetch(FORM_ENDPOINT, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify(collectFormPayload(form))
      });

      const result = await response.json().catch(() => ({}));

      if (!response.ok || result.success === false) {
        throw new Error(result.message || 'Form submission failed');
      }

      setNotification(notifId, 'success');
      form.reset();
      setTimeout(() => {
        document.getElementById(notifId).style.display = 'none';
      }, 6000);
    } catch (error) {
      console.error('Brief submission failed:', error);
      setNotification(notifId, 'error', STATUS_TEXT.error[currentLang] || STATUS_TEXT.error.ru);
    } finally {
      button.disabled = false;
      button.innerHTML = originalButtonHtml;
    }
  }

  // Init
  renderTranslations();
</script>
</body>
</html>
